version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agent_money

  # Optional: ClickHouse for massive telemetry logs as mentioned in the prompt
  clickhouse:
    image: clickhouse/clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"

  transaction-handler:
    build:
      context: ./services/transaction-handler
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_URL: kafka:29092
      DATABASE_URL: postgres://admin:password@postgres:5432/agent_money

  policy-engine:
    build:
      context: ./services/policy-engine
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://admin:password@postgres:5432/agent_money
      OTEL_COLLECTOR_URL: otel-collector:4317
      RISK_SERVICE_URL: http://risk-service:8082

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  orchestration-service:
    build:
      context: ./services/orchestration-service
    depends_on:
      - redis
      - transaction-handler
    environment:
      REDIS_URL: redis:6379
      TRANSACTION_HANDLER_URL: http://transaction-handler:8080
      DATABASE_URL: postgres://admin:password@postgres:5432/agent_money?sslmode=disable
      OTEL_COLLECTOR_URL: otel-collector:4317

  metering-service:
    build:
      context: ./services/metering-service
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      KAFKA_URL: kafka:29092
      DATABASE_URL: postgres://admin:password@postgres:5432/agent_money?sslmode=disable
      REDIS_URL: redis:6379
      METERING_TOPIC: financial-events

  reconciliation-worker:
    build:
      context: ./services/reconciliation-worker
    depends_on:
      - postgres
      - kafka
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/agent_money
      OTEL_COLLECTOR_URL: http://otel-collector:4317

  kong:
    image: kong:latest
    volumes:
      - ./kong:/usr/local/kong/declarative
    depends_on:
      - orchestration-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./monitoring/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - jaeger
    ports:
      - "4317" # OTLP gRPC
      - "8889" # Prometheus exporter
