global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'orchestration-service'
    static_configs:
      - targets: ['orchestration-service:8080']
    metrics_path: '/metrics'

  - job_name: 'transaction-handler'
    static_configs:
      - targets: ['transaction-handler:8080']
    metrics_path: '/metrics'
